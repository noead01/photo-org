services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-photoorg}
      POSTGRES_USER: ${POSTGRES_USER:-photoorg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-photoorg}
    ports:
      - "${PHOTO_ORG_POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  db-service:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: ${PHOTO_ORG_DB_SERVICE_DATABASE_URL:-postgresql+psycopg://photoorg:photoorg@postgres:5432/photoorg}
      PHOTO_ORG_API_CORS_ALLOWED_ORIGINS: ${PHOTO_ORG_API_CORS_ALLOWED_ORIGINS:-http://127.0.0.1:5173,http://localhost:5173}
      FACE_DETECT_SCALE_FACTOR: ${FACE_DETECT_SCALE_FACTOR:-1.1}
      FACE_DETECT_MIN_NEIGHBORS: ${FACE_DETECT_MIN_NEIGHBORS:-5}
      FACE_DETECT_MIN_SIZE: ${FACE_DETECT_MIN_SIZE:-60x60}
      FACE_DETECT_MAX_SIZE: ${FACE_DETECT_MAX_SIZE:-}
      FACE_DETECT_MIN_AREA_RATIO: ${FACE_DETECT_MIN_AREA_RATIO:-0.0}
      FACE_DETECT_MAX_AREA_RATIO: ${FACE_DETECT_MAX_AREA_RATIO:-1.0}
      FACE_DETECT_ASPECT_RATIO_MIN: ${FACE_DETECT_ASPECT_RATIO_MIN:-0.0}
      FACE_DETECT_ASPECT_RATIO_MAX: ${FACE_DETECT_ASPECT_RATIO_MAX:-100.0}
      FACE_RECOGNITION_SFACE_MODEL_FILE: ${FACE_RECOGNITION_SFACE_MODEL_FILE:-/models/opencv/face_recognition_sface_2021dec.onnx}
    volumes:
      - type: bind
        source: ${PHOTO_ORG_PHOTO_LIBRARY_HOST_PATH:-./seed-corpus}
        target: ${PHOTO_ORG_PHOTO_LIBRARY_CONTAINER_PATH:-/photos}
      - type: bind
        source: ${PHOTO_ORG_MODEL_HOST_PATH:-/mnt/d/models}
        target: ${PHOTO_ORG_MODEL_CONTAINER_PATH:-/models}
        read_only: true
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz').read()\"",
        ]
      interval: 3s
      timeout: 5s
      retries: 20
    ports:
      - "${PHOTO_ORG_API_HOST_PORT:-8000}:8000"

  ui:
    build:
      context: .
      dockerfile: apps/ui/Dockerfile
    environment:
      VITE_API_BASE_URL: ${PHOTO_ORG_UI_API_BASE_URL:-http://127.0.0.1:8000}
      VITE_API_PROXY_TARGET: ${PHOTO_ORG_UI_PROXY_TARGET:-http://db-service:8000}
    depends_on:
      db-service:
        condition: service_healthy
    ports:
      - "${PHOTO_ORG_UI_HOST_PORT:-5173}:5173"

volumes:
  postgres_data:
