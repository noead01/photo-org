services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-photoorg}
      POSTGRES_USER: ${POSTGRES_USER:-photoorg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-photoorg}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  db-service:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://photoorg:photoorg@postgres:5432/photoorg}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
