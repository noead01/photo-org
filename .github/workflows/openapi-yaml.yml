name: openapi-yaml

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "pyproject.toml"
      - "uv.lock"
      - "packages/**/pyproject.toml"
      - ".github/workflows/openapi-yaml.yml"
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "pyproject.toml"
      - "uv.lock"
      - "packages/**/pyproject.toml"
      - ".github/workflows/openapi-yaml.yml"

jobs:
  generate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --group test
      - run: uv run python apps/api/scripts/generate_openapi.py
      - uses: actions/upload-artifact@v4
        with:
          name: openapi-yaml
          path: apps/api/.generated/openapi.yaml
