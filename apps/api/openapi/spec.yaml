openapi: 3.1.0
info:
  title: Photo Organizer API
  version: 0.1.0
paths:
  /api/v1/internal/ingest-queue/process:
    post:
      tags:
      - internal-ingest-queue
      summary: Process Ingest Queue Endpoint
      operationId: process_ingest_queue_endpoint_api_v1_internal_ingest_queue_process_post
      parameters:
      - name: X-Worker-Role
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Worker-Role
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcessQueueRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessQueueResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /healthz:
    get:
      summary: Healthz
      operationId: healthz_healthz_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
components:
  schemas:
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    ProcessQueueRequest:
      properties:
        limit:
          type: integer
          maximum: 1000.0
          minimum: 1.0
          title: Limit
          default: 100
      type: object
      title: ProcessQueueRequest
    ProcessQueueResponse:
      properties:
        processed:
          type: integer
          title: Processed
        failed:
          type: integer
          title: Failed
        retryable_errors:
          type: integer
          title: Retryable Errors
      type: object
      required:
      - processed
      - failed
      - retryable_errors
      title: ProcessQueueResponse
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
