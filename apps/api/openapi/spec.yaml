openapi: 3.1.0
info:
  title: Photo Organizer API
  version: 0.1.0
paths:
  /api/v1/internal/ingest-queue/process:
    post:
      tags:
      - internal-ingest-queue
      summary: Process Ingest Queue Endpoint
      operationId: process_ingest_queue_endpoint_api_v1_internal_ingest_queue_process_post
      parameters:
      - name: X-Worker-Role
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Worker-Role
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcessQueueRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessQueueResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/photos:
    get:
      tags:
      - photos
      summary: List Photos
      operationId: list_photos_api_v1_photos_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/PhotoHit'
                type: array
                title: Response List Photos Api V1 Photos Get
  /api/v1/photos/{photo_id}:
    get:
      tags:
      - photos
      summary: Get Photo Detail
      operationId: get_photo_detail_api_v1_photos__photo_id__get
      parameters:
      - name: photo_id
        in: path
        required: true
        schema:
          type: string
          title: Photo Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhotoDetailResponse'
        '404':
          description: Photo not found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/storage-sources:
    get:
      tags:
      - storage-sources
      summary: List Storage Sources
      operationId: list_storage_sources_api_v1_storage_sources_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/StorageSourceStatusResponse'
                type: array
                title: Response List Storage Sources Api V1 Storage Sources Get
    post:
      tags:
      - storage-sources
      summary: Register Storage Source Route
      operationId: register_storage_source_route_api_v1_storage_sources_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterStorageSourceRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StorageSourceResponse'
        '400':
          description: Storage source registration failed
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/storage-sources/{storage_source_id}:
    get:
      tags:
      - storage-sources
      summary: Get Storage Source
      operationId: get_storage_source_api_v1_storage_sources__storage_source_id__get
      parameters:
      - name: storage_source_id
        in: path
        required: true
        schema:
          type: string
          title: Storage Source Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StorageSourceStatusResponse'
        '404':
          description: Storage source not found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/storage-sources/{storage_source_id}/watched-folders:
    get:
      tags:
      - storage-sources
      summary: List Storage Source Watched Folders
      operationId: list_storage_source_watched_folders_api_v1_storage_sources__storage_source_id__watched_folders_get
      parameters:
      - name: storage_source_id
        in: path
        required: true
        schema:
          type: string
          title: Storage Source Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WatchedFolderResponse'
                title: Response List Storage Source Watched Folders Api V1 Storage
                  Sources  Storage Source Id  Watched Folders Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - storage-sources
      summary: Create Storage Source Watched Folder
      operationId: create_storage_source_watched_folder_api_v1_storage_sources__storage_source_id__watched_folders_post
      parameters:
      - name: storage_source_id
        in: path
        required: true
        schema:
          type: string
          title: Storage Source Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWatchedFolderRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchedFolderResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/storage-sources/{storage_source_id}/watched-folders/{watched_folder_id}:
    patch:
      tags:
      - storage-sources
      summary: Update Storage Source Watched Folder
      operationId: update_storage_source_watched_folder_api_v1_storage_sources__storage_source_id__watched_folders__watched_folder_id__patch
      parameters:
      - name: storage_source_id
        in: path
        required: true
        schema:
          type: string
          title: Storage Source Id
      - name: watched_folder_id
        in: path
        required: true
        schema:
          type: string
          title: Watched Folder Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWatchedFolderRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchedFolderResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - storage-sources
      summary: Delete Storage Source Watched Folder
      operationId: delete_storage_source_watched_folder_api_v1_storage_sources__storage_source_id__watched_folders__watched_folder_id__delete
      parameters:
      - name: storage_source_id
        in: path
        required: true
        schema:
          type: string
          title: Storage Source Id
      - name: watched_folder_id
        in: path
        required: true
        schema:
          type: string
          title: Watched Folder Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /healthz:
    get:
      summary: Healthz
      operationId: healthz_healthz_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
components:
  schemas:
    CatalogAvailabilityResponse:
      properties:
        metadata_queryable:
          type: boolean
          title: Metadata Queryable
        thumbnails_available:
          type: boolean
          title: Thumbnails Available
        originals_available:
          type: boolean
          title: Originals Available
      type: object
      required:
      - metadata_queryable
      - thumbnails_available
      - originals_available
      title: CatalogAvailabilityResponse
    CreateWatchedFolderRequest:
      properties:
        alias_path:
          type: string
          title: Alias Path
        watched_path:
          type: string
          title: Watched Path
        display_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Display Name
      type: object
      required:
      - alias_path
      - watched_path
      title: CreateWatchedFolderRequest
    FaceHit:
      properties:
        person_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Person Id
      type: object
      title: FaceHit
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    IngestRunSummaryResponse:
      properties:
        status:
          type: string
          title: Status
        files_seen:
          type: integer
          title: Files Seen
        files_created:
          type: integer
          title: Files Created
        files_updated:
          type: integer
          title: Files Updated
        files_missing:
          type: integer
          title: Files Missing
        error_count:
          type: integer
          title: Error Count
        error_summary:
          anyOf:
          - type: string
          - type: 'null'
          title: Error Summary
        completed_ts:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Completed Ts
      type: object
      required:
      - status
      - files_seen
      - files_created
      - files_updated
      - files_missing
      - error_count
      title: IngestRunSummaryResponse
    OriginalAvailabilityHit:
      properties:
        is_available:
          type: boolean
          title: Is Available
        availability_state:
          type: string
          title: Availability State
        last_failure_reason:
          anyOf:
          - type: string
          - type: 'null'
          title: Last Failure Reason
      type: object
      required:
      - is_available
      - availability_state
      title: OriginalAvailabilityHit
    PhotoDetailFace:
      properties:
        person_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Person Id
        bbox_x:
          anyOf:
          - type: integer
          - type: 'null'
          title: Bbox X
        bbox_y:
          anyOf:
          - type: integer
          - type: 'null'
          title: Bbox Y
        bbox_w:
          anyOf:
          - type: integer
          - type: 'null'
          title: Bbox W
        bbox_h:
          anyOf:
          - type: integer
          - type: 'null'
          title: Bbox H
      type: object
      title: PhotoDetailFace
    PhotoDetailResponse:
      properties:
        photo_id:
          type: string
          title: Photo Id
        path:
          type: string
          title: Path
        ext:
          type: string
          title: Ext
        camera_make:
          anyOf:
          - type: string
          - type: 'null'
          title: Camera Make
        orientation:
          anyOf:
          - type: string
          - type: 'null'
          title: Orientation
        shot_ts:
          anyOf:
          - type: string
          - type: 'null'
          title: Shot Ts
        filesize:
          type: integer
          title: Filesize
        tags:
          items:
            type: string
          type: array
          title: Tags
          default: []
        people:
          items:
            type: string
          type: array
          title: People
          default: []
        faces:
          items:
            $ref: '#/components/schemas/PhotoDetailFace'
          type: array
          title: Faces
          default: []
        thumbnail:
          anyOf:
          - $ref: '#/components/schemas/ThumbnailHit'
          - type: 'null'
        original:
          anyOf:
          - $ref: '#/components/schemas/OriginalAvailabilityHit'
          - type: 'null'
        metadata:
          $ref: '#/components/schemas/PhotoMetadataProjection'
      type: object
      required:
      - photo_id
      - path
      - ext
      - filesize
      - metadata
      title: PhotoDetailResponse
    PhotoHit:
      properties:
        photo_id:
          type: string
          title: Photo Id
        path:
          type: string
          title: Path
        ext:
          type: string
          title: Ext
        camera_make:
          anyOf:
          - type: string
          - type: 'null'
          title: Camera Make
        orientation:
          anyOf:
          - type: string
          - type: 'null'
          title: Orientation
        shot_ts:
          anyOf:
          - type: string
          - type: 'null'
          title: Shot Ts
        filesize:
          type: integer
          title: Filesize
        tags:
          items:
            type: string
          type: array
          title: Tags
          default: []
        people:
          items:
            type: string
          type: array
          title: People
          default: []
        faces:
          items:
            $ref: '#/components/schemas/FaceHit'
          type: array
          title: Faces
          default: []
        thumbnail:
          anyOf:
          - $ref: '#/components/schemas/ThumbnailHit'
          - type: 'null'
        original:
          anyOf:
          - $ref: '#/components/schemas/OriginalAvailabilityHit'
          - type: 'null'
        relevance:
          anyOf:
          - type: number
          - type: 'null'
          title: Relevance
      type: object
      required:
      - photo_id
      - path
      - ext
      - filesize
      title: PhotoHit
    PhotoMetadataProjection:
      properties:
        sha256:
          type: string
          title: Sha256
        phash:
          anyOf:
          - type: string
          - type: 'null'
          title: Phash
        shot_ts_source:
          anyOf:
          - type: string
          - type: 'null'
          title: Shot Ts Source
        camera_model:
          anyOf:
          - type: string
          - type: 'null'
          title: Camera Model
        software:
          anyOf:
          - type: string
          - type: 'null'
          title: Software
        gps_latitude:
          anyOf:
          - type: number
          - type: 'null'
          title: Gps Latitude
        gps_longitude:
          anyOf:
          - type: number
          - type: 'null'
          title: Gps Longitude
        gps_altitude:
          anyOf:
          - type: number
          - type: 'null'
          title: Gps Altitude
        created_ts:
          type: string
          format: date-time
          title: Created Ts
        updated_ts:
          type: string
          format: date-time
          title: Updated Ts
        modified_ts:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Modified Ts
        deleted_ts:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Deleted Ts
        faces_count:
          type: integer
          title: Faces Count
        faces_detected_ts:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Faces Detected Ts
      type: object
      required:
      - sha256
      - created_ts
      - updated_ts
      - faces_count
      title: PhotoMetadataProjection
    ProcessQueueRequest:
      properties:
        limit:
          type: integer
          maximum: 1000.0
          minimum: 1.0
          title: Limit
          default: 100
      type: object
      title: ProcessQueueRequest
    ProcessQueueResponse:
      properties:
        processed:
          type: integer
          title: Processed
        failed:
          type: integer
          title: Failed
        retryable_errors:
          type: integer
          title: Retryable Errors
      type: object
      required:
      - processed
      - failed
      - retryable_errors
      title: ProcessQueueResponse
    RecentFailureResponse:
      properties:
        watched_folder_id:
          type: string
          title: Watched Folder Id
        status:
          type: string
          title: Status
        error_summary:
          anyOf:
          - type: string
          - type: 'null'
          title: Error Summary
        completed_ts:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Completed Ts
      type: object
      required:
      - watched_folder_id
      - status
      title: RecentFailureResponse
    RegisterStorageSourceRequest:
      properties:
        root_path:
          type: string
          minLength: 1
          title: Root Path
        alias_path:
          anyOf:
          - type: string
          - type: 'null'
          title: Alias Path
        display_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Display Name
      type: object
      required:
      - root_path
      title: RegisterStorageSourceRequest
    StorageSourceResponse:
      properties:
        storage_source_id:
          type: string
          title: Storage Source Id
        display_name:
          type: string
          title: Display Name
        marker_filename:
          type: string
          title: Marker Filename
        marker_version:
          type: integer
          title: Marker Version
        availability_state:
          type: string
          title: Availability State
        last_failure_reason:
          anyOf:
          - type: string
          - type: 'null'
          title: Last Failure Reason
        last_validated_ts:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Last Validated Ts
        created_ts:
          type: string
          format: date-time
          title: Created Ts
        updated_ts:
          type: string
          format: date-time
          title: Updated Ts
      type: object
      required:
      - storage_source_id
      - display_name
      - marker_filename
      - marker_version
      - availability_state
      - created_ts
      - updated_ts
      title: StorageSourceResponse
    StorageSourceStatusResponse:
      properties:
        storage_source_id:
          type: string
          title: Storage Source Id
        display_name:
          type: string
          title: Display Name
        marker_filename:
          type: string
          title: Marker Filename
        marker_version:
          type: integer
          title: Marker Version
        availability_state:
          type: string
          title: Availability State
        last_failure_reason:
          anyOf:
          - type: string
          - type: 'null'
          title: Last Failure Reason
        last_validated_ts:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Last Validated Ts
        created_ts:
          type: string
          format: date-time
          title: Created Ts
        updated_ts:
          type: string
          format: date-time
          title: Updated Ts
        alias_paths:
          items:
            type: string
          type: array
          title: Alias Paths
        watched_folder_count:
          type: integer
          title: Watched Folder Count
        unreachable_watched_folder_count:
          type: integer
          title: Unreachable Watched Folder Count
        catalog:
          $ref: '#/components/schemas/CatalogAvailabilityResponse'
        latest_ingest_run:
          anyOf:
          - $ref: '#/components/schemas/IngestRunSummaryResponse'
          - type: 'null'
        recent_failures:
          items:
            $ref: '#/components/schemas/RecentFailureResponse'
          type: array
          title: Recent Failures
      type: object
      required:
      - storage_source_id
      - display_name
      - marker_filename
      - marker_version
      - availability_state
      - created_ts
      - updated_ts
      - alias_paths
      - watched_folder_count
      - unreachable_watched_folder_count
      - catalog
      - recent_failures
      title: StorageSourceStatusResponse
    ThumbnailHit:
      properties:
        mime_type:
          type: string
          title: Mime Type
        width:
          type: integer
          title: Width
        height:
          type: integer
          title: Height
        data_base64:
          type: string
          title: Data Base64
      type: object
      required:
      - mime_type
      - width
      - height
      - data_base64
      title: ThumbnailHit
    UpdateWatchedFolderRequest:
      properties:
        is_enabled:
          type: boolean
          title: Is Enabled
      type: object
      required:
      - is_enabled
      title: UpdateWatchedFolderRequest
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
    WatchedFolderResponse:
      properties:
        watched_folder_id:
          type: string
          title: Watched Folder Id
        storage_source_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Storage Source Id
        scan_path:
          type: string
          title: Scan Path
        relative_path:
          anyOf:
          - type: string
          - type: 'null'
          title: Relative Path
        display_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Display Name
        is_enabled:
          type: integer
          title: Is Enabled
        availability_state:
          type: string
          title: Availability State
        last_failure_reason:
          anyOf:
          - type: string
          - type: 'null'
          title: Last Failure Reason
        last_successful_scan_ts:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Last Successful Scan Ts
        latest_ingest_run:
          anyOf:
          - $ref: '#/components/schemas/IngestRunSummaryResponse'
          - type: 'null'
      type: object
      required:
      - watched_folder_id
      - scan_path
      - is_enabled
      - availability_state
      title: WatchedFolderResponse
