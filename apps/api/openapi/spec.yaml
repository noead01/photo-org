openapi: 3.1.0
info:
  title: Photo Organizer API
  summary: Photo search, browsing, and storage-source management API.
  description: Photo Organizer's OpenAPI contract is authored in the FastAPI routes
    and Pydantic models in this repository and checked in as generated output.
  version: 0.1.0
paths:
  /api/v1/internal/ingest-queue/process:
    post:
      tags:
      - internal-ingest-queue
      summary: Process ingest queue
      description: Claim and process pending ingest queue items for the worker process.
      operationId: process_ingest_queue_endpoint_api_v1_internal_ingest_queue_process_post
      parameters:
      - name: X-Worker-Role
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Worker-Role
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcessQueueRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessQueueResponse'
        '403':
          description: Worker role required
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/photos:
    get:
      tags:
      - photos
      summary: List photos
      description: Return searchable photo hits from the catalog.
      operationId: list_photos_api_v1_photos_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/PhotoHit'
                type: array
                title: Response List Photos Api V1 Photos Get
  /api/v1/photos/{photo_id}:
    get:
      tags:
      - photos
      summary: Get photo detail
      description: Return the full photo record, including metadata and availability
        details.
      operationId: get_photo_detail_api_v1_photos__photo_id__get
      parameters:
      - name: photo_id
        in: path
        required: true
        schema:
          type: string
          title: Photo Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhotoDetailResponse'
        '404':
          description: Photo not found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/storage-sources:
    get:
      tags:
      - storage-sources
      summary: List storage sources
      description: Return the current storage-source status for all registered roots.
      operationId: list_storage_sources_api_v1_storage_sources_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/StorageSourceStatusResponse'
                type: array
                title: Response List Storage Sources Api V1 Storage Sources Get
    post:
      tags:
      - storage-sources
      summary: Register storage source
      description: Create or re-register a storage root that the API manages.
      operationId: register_storage_source_route_api_v1_storage_sources_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterStorageSourceRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StorageSourceResponse'
        '400':
          description: Storage source registration failed
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/storage-sources/{storage_source_id}:
    get:
      tags:
      - storage-sources
      summary: Get storage source
      description: Return the status for a single registered storage source.
      operationId: get_storage_source_api_v1_storage_sources__storage_source_id__get
      parameters:
      - name: storage_source_id
        in: path
        required: true
        schema:
          type: string
          title: Storage Source Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StorageSourceStatusResponse'
        '404':
          description: Storage source not found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/storage-sources/{storage_source_id}/watched-folders:
    get:
      tags:
      - storage-sources
      summary: List watched folders
      description: Return all watched folders attached to a storage source.
      operationId: list_storage_source_watched_folders_api_v1_storage_sources__storage_source_id__watched_folders_get
      parameters:
      - name: storage_source_id
        in: path
        required: true
        schema:
          type: string
          title: Storage Source Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WatchedFolderResponse'
                title: Response List Storage Source Watched Folders Api V1 Storage
                  Sources  Storage Source Id  Watched Folders Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - storage-sources
      summary: Create watched folder
      description: Create a watched folder for an existing storage source.
      operationId: create_storage_source_watched_folder_api_v1_storage_sources__storage_source_id__watched_folders_post
      parameters:
      - name: storage_source_id
        in: path
        required: true
        schema:
          type: string
          title: Storage Source Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWatchedFolderRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchedFolderResponse'
        '400':
          description: Watched folder validation failed
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/storage-sources/{storage_source_id}/watched-folders/{watched_folder_id}:
    patch:
      tags:
      - storage-sources
      summary: Update watched folder
      description: Enable or disable an existing watched folder.
      operationId: update_storage_source_watched_folder_api_v1_storage_sources__storage_source_id__watched_folders__watched_folder_id__patch
      parameters:
      - name: storage_source_id
        in: path
        required: true
        schema:
          type: string
          title: Storage Source Id
      - name: watched_folder_id
        in: path
        required: true
        schema:
          type: string
          title: Watched Folder Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWatchedFolderRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchedFolderResponse'
        '404':
          description: Watched folder not found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - storage-sources
      summary: Delete watched folder
      description: Remove a watched folder from the storage source.
      operationId: delete_storage_source_watched_folder_api_v1_storage_sources__storage_source_id__watched_folders__watched_folder_id__delete
      parameters:
      - name: storage_source_id
        in: path
        required: true
        schema:
          type: string
          title: Storage Source Id
      - name: watched_folder_id
        in: path
        required: true
        schema:
          type: string
          title: Watched Folder Id
      responses:
        '204':
          description: Successful Response
        '404':
          description: Watched folder not found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /healthz:
    get:
      summary: Health check
      description: Return a minimal readiness response for the HTTP service.
      operationId: healthz_healthz_get
      responses:
        '200':
          description: A small health payload used by local startup checks.
          content:
            application/json:
              schema: {}
components:
  schemas:
    CatalogAvailabilityResponse:
      properties:
        metadata_queryable:
          type: boolean
          title: Metadata Queryable
        thumbnails_available:
          type: boolean
          title: Thumbnails Available
        originals_available:
          type: boolean
          title: Originals Available
      type: object
      required:
      - metadata_queryable
      - thumbnails_available
      - originals_available
      title: CatalogAvailabilityResponse
      description: Whether metadata, thumbnails, and originals are available.
    CreateWatchedFolderRequest:
      properties:
        alias_path:
          type: string
          title: Alias Path
          description: Alias path that identifies the storage source.
        watched_path:
          type: string
          title: Watched Path
          description: Path to watch beneath the alias root.
        display_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Display Name
          description: Optional label for the watched folder.
      type: object
      required:
      - alias_path
      - watched_path
      title: CreateWatchedFolderRequest
      description: Register a watched folder beneath a storage-source alias.
    FaceHit:
      properties:
        person_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Person Id
      type: object
      title: FaceHit
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    IngestRunSummaryResponse:
      properties:
        status:
          type: string
          title: Status
        files_seen:
          type: integer
          title: Files Seen
        files_created:
          type: integer
          title: Files Created
        files_updated:
          type: integer
          title: Files Updated
        files_missing:
          type: integer
          title: Files Missing
        error_count:
          type: integer
          title: Error Count
        error_summary:
          anyOf:
          - type: string
          - type: 'null'
          title: Error Summary
        completed_ts:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Completed Ts
      type: object
      required:
      - status
      - files_seen
      - files_created
      - files_updated
      - files_missing
      - error_count
      title: IngestRunSummaryResponse
      description: Aggregate ingest counts and completion metadata.
    OriginalAvailabilityHit:
      properties:
        is_available:
          type: boolean
          title: Is Available
        availability_state:
          type: string
          title: Availability State
        last_failure_reason:
          anyOf:
          - type: string
          - type: 'null'
          title: Last Failure Reason
      type: object
      required:
      - is_available
      - availability_state
      title: OriginalAvailabilityHit
    PhotoDetailFace:
      properties:
        person_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Person Id
          description: Recognized person identifier.
        bbox_x:
          anyOf:
          - type: integer
          - type: 'null'
          title: Bbox X
          description: Bounding-box x coordinate.
        bbox_y:
          anyOf:
          - type: integer
          - type: 'null'
          title: Bbox Y
          description: Bounding-box y coordinate.
        bbox_w:
          anyOf:
          - type: integer
          - type: 'null'
          title: Bbox W
          description: Bounding-box width in pixels.
        bbox_h:
          anyOf:
          - type: integer
          - type: 'null'
          title: Bbox H
          description: Bounding-box height in pixels.
      type: object
      title: PhotoDetailFace
      description: A single detected face and its bounding box.
    PhotoDetailResponse:
      properties:
        photo_id:
          type: string
          title: Photo Id
          description: Stable photo identifier.
        path:
          type: string
          title: Path
          description: Canonical file path for the photo.
        ext:
          type: string
          title: Ext
          description: File extension for the photo.
        camera_make:
          anyOf:
          - type: string
          - type: 'null'
          title: Camera Make
          description: Camera make, if available.
        orientation:
          anyOf:
          - type: string
          - type: 'null'
          title: Orientation
          description: Image orientation, if known.
        shot_ts:
          anyOf:
          - type: string
          - type: 'null'
          title: Shot Ts
          description: Shot timestamp as an ISO-8601 string.
        filesize:
          type: integer
          title: Filesize
          description: File size in bytes.
        tags:
          items:
            type: string
          type: array
          title: Tags
          description: Assigned tag values.
        people:
          items:
            type: string
          type: array
          title: People
          description: Recognized people attached to the photo.
        faces:
          items:
            $ref: '#/components/schemas/PhotoDetailFace'
          type: array
          title: Faces
          description: Detected faces and bounding boxes.
        thumbnail:
          anyOf:
          - $ref: '#/components/schemas/ThumbnailHit'
          - type: 'null'
          description: Inline thumbnail payload, if available.
        original:
          anyOf:
          - $ref: '#/components/schemas/OriginalAvailabilityHit'
          - type: 'null'
          description: Original-file availability summary, if available.
        metadata:
          $ref: '#/components/schemas/PhotoMetadataProjection'
          description: Canonical catalog metadata for the photo.
      type: object
      required:
      - photo_id
      - path
      - ext
      - filesize
      - metadata
      title: PhotoDetailResponse
      description: Photo identity, rich metadata, and attached assets.
    PhotoHit:
      properties:
        photo_id:
          type: string
          title: Photo Id
        path:
          type: string
          title: Path
        ext:
          type: string
          title: Ext
        camera_make:
          anyOf:
          - type: string
          - type: 'null'
          title: Camera Make
        orientation:
          anyOf:
          - type: string
          - type: 'null'
          title: Orientation
        shot_ts:
          anyOf:
          - type: string
          - type: 'null'
          title: Shot Ts
        filesize:
          type: integer
          title: Filesize
        tags:
          items:
            type: string
          type: array
          title: Tags
          default: []
        people:
          items:
            type: string
          type: array
          title: People
          default: []
        faces:
          items:
            $ref: '#/components/schemas/FaceHit'
          type: array
          title: Faces
          default: []
        thumbnail:
          anyOf:
          - $ref: '#/components/schemas/ThumbnailHit'
          - type: 'null'
        original:
          anyOf:
          - $ref: '#/components/schemas/OriginalAvailabilityHit'
          - type: 'null'
        relevance:
          anyOf:
          - type: number
          - type: 'null'
          title: Relevance
      type: object
      required:
      - photo_id
      - path
      - ext
      - filesize
      title: PhotoHit
    PhotoMetadataProjection:
      properties:
        sha256:
          type: string
          title: Sha256
          description: SHA-256 digest for the original file.
        phash:
          anyOf:
          - type: string
          - type: 'null'
          title: Phash
          description: Perceptual hash, if available.
        shot_ts_source:
          anyOf:
          - type: string
          - type: 'null'
          title: Shot Ts Source
          description: Source used to derive the shot timestamp.
        camera_model:
          anyOf:
          - type: string
          - type: 'null'
          title: Camera Model
          description: Camera model string.
        software:
          anyOf:
          - type: string
          - type: 'null'
          title: Software
          description: Software string from metadata.
        gps_latitude:
          anyOf:
          - type: number
          - type: 'null'
          title: Gps Latitude
          description: GPS latitude in decimal degrees.
        gps_longitude:
          anyOf:
          - type: number
          - type: 'null'
          title: Gps Longitude
          description: GPS longitude in decimal degrees.
        gps_altitude:
          anyOf:
          - type: number
          - type: 'null'
          title: Gps Altitude
          description: GPS altitude in meters.
        created_ts:
          type: string
          format: date-time
          title: Created Ts
          description: Creation timestamp for the catalog record.
        updated_ts:
          type: string
          format: date-time
          title: Updated Ts
          description: Last update timestamp for the catalog record.
        modified_ts:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Modified Ts
          description: Last modified timestamp from the source file, if present.
        deleted_ts:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Deleted Ts
          description: Soft-delete timestamp when the file is missing or removed.
        faces_count:
          type: integer
          title: Faces Count
          description: Number of detected faces.
        faces_detected_ts:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Faces Detected Ts
          description: Timestamp when face detection was last run.
      type: object
      required:
      - sha256
      - created_ts
      - updated_ts
      - faces_count
      title: PhotoMetadataProjection
      description: Canonical photo metadata, timestamps, and face counts.
    ProcessQueueRequest:
      properties:
        limit:
          type: integer
          maximum: 1000.0
          minimum: 1.0
          title: Limit
          description: Maximum number of pending queue items to process.
          default: 100
      type: object
      title: ProcessQueueRequest
      description: Limit how many pending ingest items to process in one call.
    ProcessQueueResponse:
      properties:
        processed:
          type: integer
          title: Processed
          description: Number of items processed successfully.
        failed:
          type: integer
          title: Failed
          description: Number of items that failed permanently.
        retryable_errors:
          type: integer
          title: Retryable Errors
          description: Number of items that can be retried.
      type: object
      required:
      - processed
      - failed
      - retryable_errors
      title: ProcessQueueResponse
      description: Counts of processed items, failures, and retryable errors.
    RecentFailureResponse:
      properties:
        watched_folder_id:
          type: string
          title: Watched Folder Id
        status:
          type: string
          title: Status
        error_summary:
          anyOf:
          - type: string
          - type: 'null'
          title: Error Summary
        completed_ts:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Completed Ts
      type: object
      required:
      - watched_folder_id
      - status
      title: RecentFailureResponse
      description: A compact summary of a watched-folder failure.
    RegisterStorageSourceRequest:
      properties:
        root_path:
          type: string
          minLength: 1
          title: Root Path
          description: Absolute path to the storage root on the host.
        alias_path:
          anyOf:
          - type: string
          - type: 'null'
          title: Alias Path
          description: Optional canonical alias for the same storage root.
        display_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Display Name
          description: Human-readable label shown in the UI and API responses.
      type: object
      required:
      - root_path
      title: RegisterStorageSourceRequest
      description: Register a storage root and optionally bind an alias or display
        name.
    StorageSourceResponse:
      properties:
        storage_source_id:
          type: string
          title: Storage Source Id
        display_name:
          type: string
          title: Display Name
        marker_filename:
          type: string
          title: Marker Filename
        marker_version:
          type: integer
          title: Marker Version
        availability_state:
          type: string
          title: Availability State
        last_failure_reason:
          anyOf:
          - type: string
          - type: 'null'
          title: Last Failure Reason
        last_validated_ts:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Last Validated Ts
        created_ts:
          type: string
          format: date-time
          title: Created Ts
        updated_ts:
          type: string
          format: date-time
          title: Updated Ts
      type: object
      required:
      - storage_source_id
      - display_name
      - marker_filename
      - marker_version
      - availability_state
      - created_ts
      - updated_ts
      title: StorageSourceResponse
      description: Storage-source identity, marker, and lifecycle metadata.
    StorageSourceStatusResponse:
      properties:
        storage_source_id:
          type: string
          title: Storage Source Id
        display_name:
          type: string
          title: Display Name
        marker_filename:
          type: string
          title: Marker Filename
        marker_version:
          type: integer
          title: Marker Version
        availability_state:
          type: string
          title: Availability State
        last_failure_reason:
          anyOf:
          - type: string
          - type: 'null'
          title: Last Failure Reason
        last_validated_ts:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Last Validated Ts
        created_ts:
          type: string
          format: date-time
          title: Created Ts
        updated_ts:
          type: string
          format: date-time
          title: Updated Ts
        alias_paths:
          items:
            type: string
          type: array
          title: Alias Paths
        watched_folder_count:
          type: integer
          title: Watched Folder Count
        unreachable_watched_folder_count:
          type: integer
          title: Unreachable Watched Folder Count
        catalog:
          $ref: '#/components/schemas/CatalogAvailabilityResponse'
        latest_ingest_run:
          anyOf:
          - $ref: '#/components/schemas/IngestRunSummaryResponse'
          - type: 'null'
        recent_failures:
          items:
            $ref: '#/components/schemas/RecentFailureResponse'
          type: array
          title: Recent Failures
      type: object
      required:
      - storage_source_id
      - display_name
      - marker_filename
      - marker_version
      - availability_state
      - created_ts
      - updated_ts
      - alias_paths
      - watched_folder_count
      - unreachable_watched_folder_count
      - catalog
      - recent_failures
      title: StorageSourceStatusResponse
      description: Storage-source registration details plus watched-folder and ingest
        status.
    ThumbnailHit:
      properties:
        mime_type:
          type: string
          title: Mime Type
        width:
          type: integer
          title: Width
        height:
          type: integer
          title: Height
        data_base64:
          type: string
          title: Data Base64
      type: object
      required:
      - mime_type
      - width
      - height
      - data_base64
      title: ThumbnailHit
    UpdateWatchedFolderRequest:
      properties:
        is_enabled:
          type: boolean
          title: Is Enabled
          description: Whether the watched folder should be active.
      type: object
      required:
      - is_enabled
      title: UpdateWatchedFolderRequest
      description: Enable or disable an existing watched folder.
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
    WatchedFolderResponse:
      properties:
        watched_folder_id:
          type: string
          title: Watched Folder Id
        storage_source_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Storage Source Id
        scan_path:
          type: string
          title: Scan Path
        relative_path:
          anyOf:
          - type: string
          - type: 'null'
          title: Relative Path
        display_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Display Name
        is_enabled:
          type: integer
          title: Is Enabled
        availability_state:
          type: string
          title: Availability State
        last_failure_reason:
          anyOf:
          - type: string
          - type: 'null'
          title: Last Failure Reason
        last_successful_scan_ts:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Last Successful Scan Ts
        latest_ingest_run:
          anyOf:
          - $ref: '#/components/schemas/IngestRunSummaryResponse'
          - type: 'null'
      type: object
      required:
      - watched_folder_id
      - scan_path
      - is_enabled
      - availability_state
      title: WatchedFolderResponse
      description: Watched-folder identity, status, and last ingest summary.
tags:
- name: photos
  description: Browse and inspect photo records and metadata.
- name: search
  description: Search photos using text, filters, and similarity signals.
- name: storage-sources
  description: Register storage roots and manage watched folders.
- name: internal-ingest-queue
  description: Worker-only queue processing endpoint.
